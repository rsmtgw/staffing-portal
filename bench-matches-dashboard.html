      <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px">Re-evaluate this match using Gemini — no configuration files, raw AI judgment. Same scoring math applied for a fair comparison.</p>
      <button class="btn btn-primary" id="ai-analyze-btn" onclick="runAiAnalyze()">🤖 Analyze with AI</button>
      <div id="ai-analyze-result" style="margin-top:14px"></div>
    </div>
  `;

  document.getElementById('explain-overlay').classList.add('open');
}

async function runAiAnalyze() {
  const d = window._explainDemand;
  const c = window._explainCandidate;
  if (!d || !c) return;
  const btn = document.getElementById('ai-analyze-btn');
  const out = document.getElementById('ai-analyze-result');
  if (!btn || !out) return;
  btn.disabled = true;
  btn.textContent = '⏳ Analyzing…';
  out.innerHTML = '';
  try {
    const resp = await fetch('/api/report/ai-analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        role_id: String(d.role_id),
        employee_id: c.employee_id || null,
        candidate_name: c.name || null,
        candidate_role: c.role || null,
      }),
    });
    if (!resp.ok) { const e = await resp.text(); throw new Error(e); }
    const data = await resp.json();
    out.innerHTML = _renderAiAnalysis(data);
  } catch(e) {
    out.innerHTML = `<p style="color:var(--nomatch);font-size:13px">Error: ${escHtml(e.message)}</p>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🤖 Analyze with AI';
  }
}

function _renderAiAnalysis(data) {
  const r = data.rule_result || {};
  const a = data.ai_result || {};
  const diff = data.diff || [];
  const fitColor = s => s === 'Excellent' ? 'var(--excellent)' : s === 'Good' ? 'var(--good)' : s === 'Regular' ? 'var(--regular)' : 'var(--nomatch)';
  const scoreDelta = ((a.score_pct || 0) - (r.score_pct || 0)).toFixed(1);
  const deltaSign = scoreDelta > 0 ? '+' : '';
  const deltaColor = scoreDelta > 0 ? 'var(--excellent)' : scoreDelta < 0 ? 'var(--nomatch)' : 'var(--text-muted)';

  let html = `
    <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:14px">
      <div style="flex:1;min-width:140px;background:var(--surface2);border-radius:8px;padding:12px">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Rule-based (current)</div>
        <div style="font-size:20px;font-weight:700;color:${fitColor(r.fit)}">${escHtml(r.fit || '—')}</div>
        <div style="font-size:14px;color:${fitColor(r.fit)}">${r.score_pct != null ? r.score_pct + '%' : '—'}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px">Primary: ${escHtml(r.primary_match || '—')}</div>
      </div>
      <div style="font-size:24px;color:var(--text-muted);align-self:center">→</div>
      <div style="flex:1;min-width:140px;background:var(--surface2);border-radius:8px;padding:12px;border:1px solid #7c3aed44">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">AI Assessment (Gemini)</div>
        <div style="font-size:20px;font-weight:700;color:${fitColor(a.fit)}">${escHtml(a.fit || '—')}</div>
        <div style="font-size:14px;color:${fitColor(a.fit)}">${a.score_pct != null ? a.score_pct + '%' : '—'} <span style="font-size:12px;color:${deltaColor}">(${deltaSign}${scoreDelta}%)</span></div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px">Primary: ${escHtml(a.primary_match || '—')}${a.primary_via ? ' via <em>' + escHtml(a.primary_via) + '</em>' : ''}</div>
      </div>
    </div>`;

  if (a.primary_reasoning) {
    html += `<div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;font-style:italic">Primary reasoning: ${escHtml(a.primary_reasoning)}</div>`;
  }

  if (diff.length) {
    html += `<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:600;color:#f59e0b;margin-bottom:6px">⚡ ${diff.length} difference${diff.length > 1 ? 's' : ''} from rule-based scoring</div><table style="width:100%;font-size:12px;border-collapse:collapse">`;
    html += `<tr style="color:var(--text-muted)"><th style="text-align:left;padding:3px 6px">Tier</th><th style="text-align:left;padding:3px 6px">Skill</th><th style="text-align:left;padding:3px 6px">Rule</th><th style="text-align:left;padding:3px 6px">AI</th><th style="text-align:left;padding:3px 6px">AI via</th></tr>`;
    for (const d of diff) {
      const ruleCol = d.rule === 'matched' || d.rule === 'exact' || d.rule === 'equivalent' ? `<span style="color:var(--excellent)">✓ ${escHtml(d.rule)}</span>` : `<span style="color:var(--nomatch)">✗ ${escHtml(d.rule)}</span>`;
      const aiCol   = d.ai   === 'matched' || d.ai   === 'exact' || d.ai   === 'equivalent' ? `<span style="color:var(--excellent)">✓ ${escHtml(d.ai)}</span>`   : `<span style="color:var(--nomatch)">✗ ${escHtml(d.ai)}</span>`;
      html += `<tr style="border-top:1px solid #ffffff10"><td style="padding:3px 6px;color:var(--text-muted)">${escHtml(d.tier)}</td><td style="padding:3px 6px">${escHtml(d.skill)}</td><td style="padding:3px 6px">${ruleCol}</td><td style="padding:3px 6px">${aiCol}</td><td style="padding:3px 6px;color:#93c5fd;font-size:11px">${d.ai_via ? escHtml(d.ai_via) : '—'}</td></tr>`;
    }
    html += `</table></div>`;
  } else {
    html += `<div style="font-size:12px;color:var(--excellent);margin-bottom:10px">✓ AI agrees with rule-based scoring — no differences found.</div>`;
  }

  if (a.overall_reasoning) {
    html += `<div style="font-size:12px;line-height:1.6;color:var(--text-muted);border-top:1px solid #ffffff10;padding-top:10px">${escHtml(a.overall_reasoning)}</div>`;
  }
  return html;
}

function closeExplain(e) {
  if (!e || e.target === document.getElementById('explain-overlay') || e.currentTarget.id === 'explain-close') {
    document.getElementById('explain-overlay').classList.remove('open');
  }
}


// ── Primary-match info popover ────────────────────────────────────────────────

let _activePopover = null;  // {el, icon} currently open

function _buildMatchPopoverHtml(c) {
  const t   = (c.scoring_trace || {}).primary || {};
  const res = t.result || c.primary_match || 'none';
  const pathMap = {
    'exact-direct':      'Direct word match (P3+)',
    'exact-alias':       'Formal alias → canonical (P3+)',
    'exact-auto-canonical': 'Auto-stripped qualifier → exact (P3+)',
    'equivalent-json':   'Equivalency table (skill_equivalencies.json)',
    'equivalent-embedding': 'AI embedding similarity',
    'equivalent-capability':'Capability inference (GAP-040)',
    'equivalent-ai-map':    'Upload-time AI semantic map',
    'open-gate':         'No primary required (open gate)',
    'none':              'No match found',
  };
  const pathLabel = pathMap[t.match_path] || t.match_path || '—';
  const resTag = res === 'exact' ? 'exact' : res === 'equivalent' ? 'equiv' : 'none';
  const resLabel = res === 'exact' ? '✓ Exact' : res === 'equivalent' ? '~ Equivalent' : '✗ No match';

  const row = (label, val) =>
    val ? `<div class="mp-row"><span class="mp-label">${escHtml(label)}</span><span class="mp-val">${escHtml(String(val))}</span></div>` : '';

  // Embedding + LLM section
  let embedHtml = '';
  if (t.embedding_triggered_by) {
    const llmOk = t.llm_revalidated === true;
    const llmTag = t.llm_revalidated !== undefined && t.llm_revalidated !== null
      ? `<span class="mp-tag ${llmOk ? 'llm-ok' : 'llm-rej'}">${llmOk ? '✓ LLM confirmed' : '✗ LLM rejected'}</span>`
      : '';
    embedHtml = `
      <div class="mp-row">
        <span class="mp-label">Triggered by</span>
        <span class="mp-val"><span class="mp-tag ai">⚡ AI</span>${escHtml(t.embedding_triggered_by)}</span>
      </div>
      <div class="mp-row">
        <span class="mp-label">Cosine score</span>
        <span class="mp-val">${t.embedding_score ?? '—'} (threshold: ${t.embedding_threshold ?? 0.82})</span>
      </div>
      ${t.llm_revalidated !== undefined && t.llm_revalidated !== null ? `
      <div class="mp-row">
        <span class="mp-label">LLM check</span>
        <span class="mp-val">${llmTag}</span>
      </div>` : ''}
      ${t.llm_reason ? `<div class="mp-row"><span class="mp-label">LLM reason</span><span class="mp-val">${escHtml(t.llm_reason)}</span></div>` : ''}`;
  }

  // Rejected embeddings (LLM said no)
  let rejectHtml = '';
  if (t.embedding_rejections && t.embedding_rejections.length) {
    const items = t.embedding_rejections.map(r =>
      `<div class="mp-reject-item"><span class="mp-tag llm-rej">✗</span>${escHtml(r.candidate_skill)} (score ${r.embedding_score}) — ${escHtml(r.llm_reason || '')}</div>`
    ).join('');
    rejectHtml = `
      <div style="margin-top:8px">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">AI matches rejected by LLM:</div>
        ${items}
      </div>`;
  }

  // Alias detail
  let aliasHtml = '';
  if (t.match_detail && (t.match_path === 'exact-alias' || t.match_path === 'exact-auto-canonical')) {
    aliasHtml = `<div class="mp-row"><span class="mp-label">Resolved as</span><span class="mp-val">${escHtml(t.match_detail)}</span></div>`;
  } else if (t.match_detail && t.match_path === 'equivalent-json') {
    aliasHtml = `<div class="mp-row"><span class="mp-label">Via</span><span class="mp-val">${escHtml(t.match_detail)}</span></div>`;
  }

  // Improvement note
  let noteHtml = '';
  if (t.match_path === 'equivalent-embedding' && t.llm_revalidated) {
    noteHtml = `<div class="mp-note">💡 AI + LLM confirmed this match. Consider adding <strong>${escHtml(t.embedding_triggered_by || '')}</strong> to <code>skill_equivalencies.json</code> to make it deterministic and avoid future AI calls.</div>`;
  } else if (t.match_path === 'equivalent-json') {
    noteHtml = `<div class="mp-note">📋 Matched via <code>skill_equivalencies.json</code> — deterministic, no AI involved.</div>`;
  } else if (res === 'exact') {
    noteHtml = `<div class="mp-note">✓ Exact match — candidate has the skill directly in their profile at P3+.</div>`;
  } else if (res === 'none') {
    noteHtml = `<div class="mp-note">✗ No path found — candidate missing primary skill and no equivalency or AI match applies.</div>`;
  }

  return `
    <h4>How Primary Skill Was Determined</h4>
    <div class="mp-row">
      <span class="mp-label">Demand skill</span>
      <span class="mp-val">${escHtml(t.skill || c.scoring_trace?.primary?.skill || '—')}</span>
    </div>
    <div class="mp-row">
      <span class="mp-label">Result</span>
      <span class="mp-val"><span class="mp-tag ${resTag}">${resLabel}</span></span>
    </div>
    <div class="mp-row">
      <span class="mp-label">Path</span>
      <span class="mp-val">${escHtml(pathLabel)}</span>
    </div>
    ${aliasHtml}
    ${row('Proficiency', t.proficiency_label)}
    ${embedHtml}
    ${rejectHtml}
    ${noteHtml}`;
}

function toggleMatchPopover(event, iconEl) {
  event.stopPropagation();
  const c = JSON.parse(iconEl.getAttribute('data-candidate'));

  // Close if same icon clicked again
  if (_activePopover && _activePopover.icon === iconEl) {
    _closeMatchPopover();
    return;
  }
  _closeMatchPopover();

  let pop = document.getElementById('match-popover');
  if (!pop) {
    pop = document.createElement('div');
    pop.id = 'match-popover';
    pop.className = 'match-popover';
    pop.addEventListener('click', e => e.stopPropagation());
    document.body.appendChild(pop);
  }

  pop.innerHTML = _buildMatchPopoverHtml(c);

  // Position near icon
  const rect = iconEl.getBoundingClientRect();
  const vpW = window.innerWidth;
  const popW = Math.min(340, vpW * 0.92);
  let left = rect.right + 8;
  if (left + popW > vpW - 8) left = rect.left - popW - 8;
  if (left < 8) left = 8;
  const top = Math.min(rect.top, window.innerHeight - 420);

  pop.style.left = left + 'px';
  pop.style.top  = Math.max(top, 8) + 'px';
  pop.classList.add('visible');
  _activePopover = { el: pop, icon: iconEl };
}

function _closeMatchPopover() {
  if (_activePopover) {
    _activePopover.el.classList.remove('visible');
    _activePopover = null;
  }
}

// Close popover when clicking anywhere else
document.addEventListener('click', () => _closeMatchPopover());
document.addEventListener('keydown', e => { if (e.key === 'Escape') _closeMatchPopover(); });


// ── Interactive Skill Match Tuning ────────────────────────────────────────────
let _interactState = null;  // holds current interaction context

async function showInteract(btn) {
  const d = JSON.parse(btn.getAttribute('data-demand'));
  const c = JSON.parse(btn.getAttribute('data-candidate'));

  const content = document.getElementById('interact-content');
  content.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)"><div class="spinner"></div>Loading skill data…</div>';
  document.getElementById('interact-overlay').classList.add('open');

  try {
    const resp = await fetch('/api/report/what-if-match', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        role_id: d.role_id,
        employee_id: c.employee_id || null,
        candidate_name: c.name || null,
        candidate_role: c.role || null,
      }),
    });
    if (!resp.ok) {
      const err = await resp.text();
      content.innerHTML = '<p style="color:var(--nomatch)">Error: ' + escHtml(err) + '</p>';
      return;
    }
    const data = await resp.json();
    _interactState = {
      demand: data.demand,
      employeeId: data.employee_id,
      candidateName: data.candidate_name,
      candidateRole: data.candidate_role,
      roleId: data.role_id,
      originalResult: data.original_result,
      updatedResult: data.updated_result,
      skillProfile: data.skill_profile.map(s => ({ ...s })),
      inferredAdditional: data.inferred_additional_skills.map(s => ({ ...s })),
      sessionId: 'interact-' + Date.now(),
      rating: 0,
    };
    _renderInteractModal();
  } catch (err) {
    content.innerHTML = '<p style="color:var(--nomatch)">Network error: ' + escHtml(err.message) + '</p>';
  }
}

function _renderInteractModal() {
  const s = _interactState;
  const dm = s.demand;
  const content = document.getElementById('interact-content');
  const kv = (k, v) => `<div class="explain-kv"><span class="k">${k}: </span><span class="v">${escHtml(v || '—')}</span></div>`;

  const profOptions = (selected) => [1,2,3,4,5].map(p =>
    `<option value="${p}" ${p === selected ? 'selected' : ''}>P${p} - ${['Beginner','Intermediate','Advanced','Expert','Master'][p-1]}</option>`
  ).join('');

  // Demand skills section
  const demandSkills = `
    <div class="interact-section">
      <h3>Demand Skills</h3>
      <div class="explain-grid">
        ${kv('Role', dm.role || dm.role_id)}
        ${kv('Primary Skill', dm.primary_skill)}
        ${kv('Career Level', dm.career_level)}
        ${kv('Capability', dm.capability)}
      </div>
      ${(dm.secondary_skills || []).length ? '<div style="margin-top:8px"><span style="font-size:11px;color:var(--text-muted)">Secondary:</span> <div class="explain-skills">' + dm.secondary_skills.map(sk => '<span class="explain-pill matched">' + escHtml(sk) + '</span>').join('') + '</div></div>' : ''}
      ${(dm.other_skills || []).length ? '<div style="margin-top:4px"><span style="font-size:11px;color:var(--text-muted)">Other:</span> <div class="explain-skills">' + dm.other_skills.map(sk => '<span class="explain-pill matched" style="color:var(--accent2);border-color:var(--accent2)55">' + escHtml(sk) + '</span>').join('') + '</div></div>' : ''}
    </div>`;

  // Candidate editable skills
  const skillRows = s.skillProfile.map((sk, i) => `
    <div class="skill-edit-row" data-idx="${i}">
      <span class="skill-name">${escHtml(sk.skill)}</span>
      <span class="skill-source">${escHtml(sk.source)}</span>
      <select onchange="_updateSkillProf(${i}, this.value)">${profOptions(sk.proficiency)}</select>
      <button class="remove-skill" onclick="_removeSkill(${i})" title="Remove">&times;</button>
    </div>
  `).join('');

  // Inferred additional skills (toggleable)
  const inferredRows = s.inferredAdditional.length ? `
    <div class="interact-section">
      <h3>Additional Skills (Inferred from CSV)</h3>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">Click + to add a skill to the candidate profile for this what-if scenario.</div>
      <div id="inferred-skills-list">
        ${s.inferredAdditional.map((sk, i) => `
          <div class="skill-edit-row" data-inf-idx="${i}">
            <span class="skill-name">${escHtml(sk.skill)}</span>
            <span class="skill-source" style="color:var(--regular)">inferred</span>
            <select id="inf-prof-${i}">${profOptions(sk.proficiency)}</select>
            <button class="btn btn-secondary" style="font-size:11px;padding:2px 8px" onclick="_addInferredSkill(${i})">+</button>
          </div>
        `).join('')}
      </div>
    </div>` : '';

  // Add manual skill row
  const addSkillRow = `
    <div class="add-skill-row">
      <input id="new-skill-name" type="text" placeholder="Add a new skill..." />
      <select id="new-skill-prof">${profOptions(3)}</select>
      <button class="btn btn-primary" style="font-size:12px;padding:4px 12px" onclick="_addManualSkill()">+ Add</button>
    </div>`;

  // Result comparison
  const orig = s.originalResult;
  const upd = s.updatedResult;
  const origColor = _fitColor(orig.fit);
  const updColor = _fitColor(upd.fit);
  const scoreDelta = (upd.score_pct - orig.score_pct).toFixed(1);
  const deltaClass = scoreDelta > 0 ? 'positive' : scoreDelta < 0 ? 'negative' : 'neutral';
  const deltaSign = scoreDelta > 0 ? '+' : '';

  const resultSection = `
    <div class="interact-result" id="interact-result-section">
      <div style="display:flex;gap:24px;flex-wrap:wrap">
        <div>
          <div style="font-size:11px;color:var(--text-muted)">Original</div>
          <span style="color:${origColor};font-weight:700;font-size:16px">${orig.fit} ${(orig.score_pct||0).toFixed(1)}%</span>
        </div>
        <div style="font-size:20px;color:var(--text-muted);align-self:center">→</div>
        <div>
          <div style="font-size:11px;color:var(--text-muted)">Updated</div>
          <span style="color:${updColor};font-weight:700;font-size:16px">${upd.fit} ${(upd.score_pct||0).toFixed(1)}%</span>
        </div>
        <div class="delta ${deltaClass}" style="align-self:center;font-size:14px;font-weight:700">${deltaSign}${scoreDelta}%</div>
      </div>
      ${upd.matched_skills ? '<div style="margin-top:8px"><span style="font-size:11px;color:var(--text-muted)">Matched:</span> <div class="explain-skills">' + (upd.matched_skills||[]).map(sk => '<span class="explain-pill matched">✓ ' + escHtml(sk) + '</span>').join('') + '</div></div>' : ''}
      ${upd.missing_skills ? '<div style="margin-top:4px"><span style="font-size:11px;color:var(--text-muted)">Missing:</span> <div class="explain-skills">' + (upd.missing_skills||[]).map(sk => '<span class="explain-pill missing">✗ ' + escHtml(sk) + '</span>').join('') + '</div></div>' : ''}
      ${upd.rationale ? '<div style="margin-top:8px;font-size:12px;color:var(--text-muted)">' + escHtml(upd.rationale) + '</div>' : ''}
    </div>`;

  // Rating + submit actions
  const stars = [1,2,3,4,5].map(n =>
    `<span class="star ${n <= s.rating ? 'active' : ''}" onclick="_setRating(${n})">★</span>`
  ).join('');

  const actionsSection = `
    <div class="interact-actions">
      <button class="btn btn-primary" onclick="_recomputeMatch()">🔄 Recompute Match</button>
      <div class="rating-group"><label>Rating:</label>${stars}</div>
      <textarea id="interact-comment" placeholder="Optional comment…" rows="1"></textarea>
      <button class="btn btn-primary" style="background:var(--excellent)" onclick="_submitInteraction()">✓ Submit</button>
    </div>`;

  content.innerHTML = `
    <h2>Interactive Match Tuning</h2>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">${escHtml(s.candidateName)} · ${escHtml(s.candidateRole)}</div>
    ${demandSkills}
    <div class="interact-section">
      <h3>Candidate Skills (Editable)</h3>
      <div id="skill-edit-list">${skillRows}</div>
      ${addSkillRow}
    </div>
    ${inferredRows}
    ${resultSection}
    ${actionsSection}
  `;
}

function _fitColor(fit) {
  if (fit === 'Excellent') return 'var(--excellent)';
  if (fit === 'Good') return 'var(--good)';
  if (fit === 'Regular') return 'var(--regular)';
  return 'var(--nomatch)';
}

function _updateSkillProf(idx, val) {
  _interactState.skillProfile[idx].proficiency = parseInt(val, 10);
}

function _removeSkill(idx) {
  _interactState.skillProfile.splice(idx, 1);
  _renderInteractModal();
}

function _addManualSkill() {
  const nameEl = document.getElementById('new-skill-name');
  const profEl = document.getElementById('new-skill-prof');
  const name = (nameEl.value || '').trim();
  if (!name) return;
  // Prevent duplicates
  if (_interactState.skillProfile.some(s => s.skill.toLowerCase() === name.toLowerCase())) {
    nameEl.style.borderColor = 'var(--nomatch)';
    setTimeout(() => nameEl.style.borderColor = '', 1500);
    return;
  }
  _interactState.skillProfile.push({ skill: name, proficiency: parseInt(profEl.value, 10), source: 'manual' });
  nameEl.value = '';
  _renderInteractModal();
}

function _addInferredSkill(infIdx) {
  const sk = _interactState.inferredAdditional[infIdx];
  const profEl = document.getElementById('inf-prof-' + infIdx);
  const prof = profEl ? parseInt(profEl.value, 10) : sk.proficiency;
  // Prevent duplicates
  if (_interactState.skillProfile.some(s => s.skill.toLowerCase() === sk.skill.toLowerCase())) return;
  _interactState.skillProfile.push({ skill: sk.skill, proficiency: prof, source: 'inferred' });
  _interactState.inferredAdditional.splice(infIdx, 1);
  _renderInteractModal();
}

function _setRating(n) {
  _interactState.rating = n;
  document.querySelectorAll('.interact-actions .star').forEach((el, i) => {
    el.classList.toggle('active', i < n);
  });
}

async function _recomputeMatch() {
  const s = _interactState;
  const recompBtn = document.querySelector('.interact-actions .btn-primary');
  if (recompBtn) { recompBtn.disabled = true; recompBtn.textContent = '⏳ Recomputing…'; }

  try {
    const resp = await fetch('/api/report/what-if-match', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        role_id: s.roleId,
        employee_id: s.employeeId || null,
        candidate_name: s.candidateName || null,
        candidate_role: s.candidateRole || null,
        edited_skill_profile: s.skillProfile.map(sk => ({
          skill: sk.skill,
          proficiency: sk.proficiency,
          source: sk.source,
        })),
      }),
    });
    if (!resp.ok) {
      const err = await resp.text();
      alert('Recompute failed: ' + err);
      return;
    }
    const data = await resp.json();
    s.updatedResult = data.updated_result;
    _renderInteractModal();
  } catch (err) {
    alert('Network error: ' + err.message);
  }
}

async function _submitInteraction() {
  const s = _interactState;
  if (s.rating < 1) {
    alert('Please select a rating (1-5 stars) before submitting.');
    return;
  }

  const comment = (document.getElementById('interact-comment') || {}).value || '';
  const payload = {
    session_id: s.sessionId,
    role_id: s.roleId,
    employee_id: s.employeeId || '',
    candidate_name: s.candidateName,
    candidate_role: s.candidateRole,
    rating: s.rating,
    comment: comment || null,
    demand: s.demand,
    original_result: s.originalResult,
    updated_result: s.updatedResult,
    edited_skill_profile: s.skillProfile,
    inferred_additional_skills: s.inferredAdditional,
  };

  try {
    const resp = await fetch('/api/report/interaction-feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!resp.ok) {
      const err = await resp.text();
      alert('Submit failed: ' + err);
      return;
    }
    const data = await resp.json();
    // Show success toast
    const toast = document.createElement('div');
    toast.className = 'interact-toast';
    toast.textContent = '✓ Interaction saved (ID: ' + data.feedback_id + ')';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
    closeInteract();
  } catch (err) {
    alert('Network error: ' + err.message);
  }
}

function closeInteract(e) {
  if (!e || e.target === document.getElementById('interact-overlay') || e.currentTarget.id === 'interact-close') {
    document.getElementById('interact-overlay').classList.remove('open');
    _interactState = null;
  }
}


window.addEventListener('DOMContentLoaded', () => {
  // Auto-load on open when served from FastAPI (not when opened as a local file)
  if (window.location.protocol !== 'file:') loadData();
  // Close modals on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeExplain({ target: document.getElementById('explain-overlay') });
      closeInteract({ target: document.getElementById('interact-overlay') });
    }
  });
});
</script>
</body>
