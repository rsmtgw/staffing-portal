name: Trigger auto deployment for staffing-agent

on:
  push:
    branches:
      - staffing-agent
    paths:
      - '**'
      - '.github/workflows/staffing-agent-AutoDeploy.yml'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Checkout AI-Staffing-Matchmaker (matching engine)
        uses: actions/checkout@v2
        with:
          repository: rsmtgw/AI-Staffing-Matchmaker
          ref: match-maker_002
          path: ai-staffing-matchmaker

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.STAFFINGAGENT_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.STAFFINGAGENT_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.STAFFINGAGENT_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          registryUrl: ${{ secrets.STAFFINGAGENT_REGISTRY_URL }}
          registryUsername: ${{ secrets.STAFFINGAGENT_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.STAFFINGAGENT_REGISTRY_PASSWORD }}
          containerAppName: staffing-agent
          resourceGroup: staffing-group
          imageToBuild: ${{ secrets.STAFFINGAGENT_REGISTRY_URL }}/staffing-agent:${{ github.sha }}

      - name: Wait for Container App provisioning to complete
        run: |
          echo "Waiting for staffing-agent to finish provisioning..."
          for i in $(seq 1 30); do
            STATE=$(az containerapp show -n staffing-agent -g staffing-group \
              --query "properties.provisioningState" -o tsv 2>/dev/null || echo "Unknown")
            echo "Attempt $i/30 — provisioningState: $STATE"
            if [ "$STATE" = "Succeeded" ] || [ "$STATE" = "Failed" ]; then
              break
            fi
            sleep 10
          done
          if [ "$STATE" != "Succeeded" ]; then
            echo "Container App did not reach Succeeded state. Final state: $STATE"
            exit 1
          fi

      - name: Deploy to staffing-agent Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: staffing-agent
          resourceGroup: staffing-group
          imageToDeploy: ${{ secrets.STAFFINGAGENT_REGISTRY_URL }}/staffing-agent:${{ github.sha }}

      - name: Ensure ingress target port is 8000
        run: |
          for attempt in 1 2 3; do
            az containerapp ingress update \
              --name staffing-agent \
              --resource-group staffing-group \
              --target-port 8000 && break
            echo "Attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
