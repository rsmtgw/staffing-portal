# =============================================================================
# Staffing Match Dashboard — docker-compose.yml
#
# Usage:
#   docker-compose up            — start all services
#   docker-compose up app        — start only the FastAPI server
#   docker-compose down -v       — remove containers + volumes
# =============================================================================

version: "3.9"

services:

  # --------------------------------------------------------------------------
  # Azurite — Azure Blob Storage emulator (used by cosmos_store fallback)
  # --------------------------------------------------------------------------
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: staffing_azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10000"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Cosmos DB emulator (first start can take ~2 min)
  # --------------------------------------------------------------------------
  cosmos:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: staffing_cosmos
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: "10"
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true"
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: "cosmos"
    ports:
      - "8081:8081"
      - "10251:10251"
      - "10252:10252"
      - "10253:10253"
      - "10254:10254"
    volumes:
      - cosmos_data:/tmp/cosmos/appdata
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8081/_explorer/emulator.pem"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # --------------------------------------------------------------------------
  # Staffing Match Dashboard FastAPI application
  # --------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: staffing_app
    depends_on:
      azurite:
        condition: service_healthy
      cosmos:
        condition: service_healthy
    environment:
      COSMOS_ENDPOINT: "https://cosmos:8081"
      USE_COSMOS: "true"
      COSMOS_KEY: "${COSMOS_KEY:-C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==}"
      COSMOS_DATABASE: "${COSMOS_DATABASE:-staffing_agent}"
      COSMOS_CONTAINER: "${COSMOS_CONTAINER:-bench_roster}"
      PORTAL_USERNAME: "${PORTAL_USERNAME:-admin}"
      PORTAL_PASSWORD: "${PORTAL_PASSWORD}"
      AZURE_OPENAI_API_KEY: "${AZURE_OPENAI_API_KEY}"
      AZURE_AI_FOUNDRY_ENDPOINT: "${AZURE_AI_FOUNDRY_ENDPOINT}"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  azurite_data:
  cosmos_data:
