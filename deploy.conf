# deploy.conf — Cosmos DB seeding flags for the GitHub Actions deploy workflow
#
# Set a flag to "true" to run that seed step on every deployment.
# Set to "false" to skip it.
#
# Rules:
#   SEED_MIGRATE   — always safe (idempotent, only creates missing containers)
#   SEED_TOOLS     — run whenever a new tool is added to TOOL_REGISTRY
#   SEED_AGENTS    — run whenever conf/agents.json changes
#   SEED_PROMPTS   — run whenever prompt content changes under conf/prompt/
#
# After a flag is set to true and deployed, you can set it back to false
# to avoid unnecessary Cosmos writes on future deployments.

SEED_MIGRATE=true
SEED_PROMPTS=true
SEED_AGENTS=true
SEED_TOOLS=true
SEED_CAREER_LEVELS=true
